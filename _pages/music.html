<style>
.music-section {
  margin-bottom: 3rem;
}

.music-section h2 {
  border-bottom: 2px solid #333;
  padding-bottom: 0.5rem;
  margin-bottom: 1.5rem;
}

.music-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
}

.music-item {
  background: #f9f9f9;
  border-radius: 12px;
  padding: 1rem;
}

.music-item iframe {
  width: 100%;
  border-radius: 8px;
}

/* Spotify embeds need more height */
.spotify-item iframe {
  height: 380px;
}

/* YouTube embeds - proper aspect ratio */
.youtube-item {
  aspect-ratio: 16/9;
}

.youtube-item iframe {
  width: 100%;
  height: 100%;
}

@media (max-width: 768px) {
  .music-grid {
    grid-template-columns: 1fr;
  }
}
</style>
